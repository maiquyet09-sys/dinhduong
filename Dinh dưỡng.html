<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quản lý dinh dưỡng</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--green:#10B981;--greendark:#047857;--greenbg:#ECFDF5;--bg:#F4F7F5;--card:#fff;--border:#E3EAE6;--text:#17332B;--gray:#6B7A75;--graylt:#95A39E;--amber:#F59E0B;--blue:#3B82F6;--red:#EF4444;--purple:#8B5CF6;--pink:#EC4899}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;padding-bottom:74px}
header{background:linear-gradient(135deg,#059669,#10B981);padding:16px 16px 12px;display:flex;justify-content:space-between;align-items:flex-start}
header .brand{font-size:10px;color:#D1FAE5;font-weight:700;letter-spacing:2.5px}
header h1{font-size:19px;font-weight:800;color:#fff;margin-top:2px}
header .status{font-size:10.5px;color:#D1FAE5;font-weight:700;text-align:right;margin-top:4px}
main{padding:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
.sectitle{font-size:11px;font-weight:800;color:var(--graylt);letter-spacing:1.5px;margin:16px 2px 8px;text-transform:uppercase}
.bar{height:8px;background:#EDF2EF;border-radius:4px;overflow:hidden}
.bar>div{height:100%;border-radius:4px;transition:width .4s}
.row{display:flex;gap:8px}
.btn{border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:14px}
.btn-green{background:var(--green);color:#fff;padding:12px 0;width:100%}
.btn-outline{background:var(--greenbg);color:var(--greendark);border:1.5px dashed var(--green);padding:9px 0;width:100%;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;margin-top:10px}
input,select{width:100%;padding:11px 12px;border-radius:12px;border:1.5px solid var(--border);font-size:14px;color:var(--text);background:#FBFDFC;outline:none}
.chip{flex-shrink:0;padding:6px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:#F1F5F3;color:var(--gray)}
.chip.on{background:var(--greendark);color:#fff}
.navbtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:#fff;font-size:20px;color:var(--gray);cursor:pointer}
nav.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:50}
nav.bottom button{flex:1;padding:9px 0 12px;border:none;background:none;cursor:pointer;color:var(--graylt);font-weight:600;font-size:10.5px}
nav.bottom button.on{color:var(--greendark);font-weight:800}
nav.bottom .ic{font-size:19px;margin-bottom:1px}
.overlay{position:fixed;inset:0;background:rgba(15,30,25,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#fff;width:100%;max-width:480px;border-radius:20px 20px 0 0;max-height:85vh;display:flex;flex-direction:column}
.hidden{display:none!important}
.item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.foodrow{display:flex;justify-content:space-between;align-items:center;padding:11px 4px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:8px}
.foodrow.sel{background:var(--greenbg)}
.xbtn{border:none;background:#FEF2F2;color:var(--red);border-radius:8px;width:26px;height:26px;cursor:pointer;font-size:13px;flex-shrink:0}
.banner{background:#FEF3C7;border-bottom:1px solid #FDE68A;padding:9px 14px;font-size:12px;color:#92400E;line-height:1.5}
canvas{max-width:100%}
</style>
</head>
<body>
<header>
  <div><div class="brand">NUTRITION TRACKER</div><h1>Quản lý dinh dưỡng</h1></div>
  <div class="status" id="saveStatus">💾 Tự lưu: BẬT</div>
</header>
<main id="content"></main>
<nav class="bottom" id="nav"></nav>
<div class="overlay hidden" id="sheetWrap" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()" id="sheetBox"></div></div>

<script>
/* ===== THƯ VIỆN THỰC PHẨM (per 100g/100ml) ===== */

{id:17,name:"Tôm",g:"Protein",kcal:99,p:24,c:.2,f:.3,fb:0,sg:0},
{id:18,name:"Mực",g:"Protein",kcal:92,p:15.6,c:3.1,f:1.4,fb:0,sg:0},
{id:19,name:"Trứng gà (1 quả ≈50g)",g:"Protein",kcal:143,p:12.6,c:.7,f:9.5,fb:0,sg:.4},
{id:20,name:"Trứng vịt lộn (1 quả ≈70g)",g:"Protein",kcal:182,p:13.7,c:1.5,f:13.5,fb:0,sg:.9},
{id:21,name:"Trứng cút lộn (1 quả ≈15g)",g:"Protein",kcal:158,p:13,c:2,f:11,fb:0,sg:.5},
{id:22,name:"Đậu phụ",g:"Protein",kcal:76,p:8.1,c:1.9,f:4.8,fb:.3,sg:.6},
{id:23,name:"Sữa tươi không đường (ml)",g:"Sữa",kcal:62,p:3.2,c:4.8,f:3.4,fb:0,sg:4.8},
{id:24,name:"Sữa tươi có đường (ml)",g:"Sữa",kcal:74,p:3,c:8.5,f:3.3,fb:0,sg:8},
{id:25,name:"Sữa chua không đường",g:"Sữa",kcal:61,p:3.5,c:4.7,f:3.3,fb:0,sg:4.7},
{id:26,name:"Sữa chua có đường",g:"Sữa",kcal:105,p:3.1,c:15.5,f:3,fb:0,sg:14},
{id:27,name:"Phô mai",g:"Sữa",kcal:402,p:25,c:1.3,f:33,fb:0,sg:.5},
{id:28,name:"Whey protein (bột)",g:"Sữa",kcal:400,p:80,c:8,f:6,fb:1,sg:5},
{id:29,name:"Rau muống",g:"Rau củ",kcal:19,p:2.6,c:3.1,f:.2,fb:2.1,sg:.5},
{id:30,name:"Cải bó xôi",g:"Rau củ",kcal:23,p:2.9,c:3.6,f:.4,fb:2.2,sg:.4},
{id:31,name:"Bông cải xanh",g:"Rau củ",kcal:34,p:2.8,c:6.6,f:.4,fb:2.6,sg:1.7},
{id:32,name:"Đậu bắp",g:"Rau củ",kcal:33,p:1.9,c:7.5,f:.2,fb:3.2,sg:1.5},
{id:33,name:"Bí đỏ",g:"Rau củ",kcal:26,p:1,c:6.5,f:.1,fb:.5,sg:2.8},
{id:34,name:"Cà rốt",g:"Rau củ",kcal:41,p:.9,c:9.6,f:.2,fb:2.8,sg:4.7},
{id:35,name:"Dưa leo",g:"Rau củ",kcal:15,p:.7,c:3.6,f:.1,fb:.5,sg:1.7},
{id:36,name:"Cà chua",g:"Rau củ",kcal:18,p:.9,c:3.9,f:.2,fb:1.2,sg:2.6},
{id:37,name:"Rau xanh hỗn hợp",g:"Rau củ",kcal:25,p:2,c:4.5,f:.3,fb:2.5,sg:1},
{id:38,name:"Chuối",g:"Hoa quả",kcal:89,p:1.1,c:22.8,f:.3,fb:2.6,sg:12.2},
{id:39,name:"Táo",g:"Hoa quả",kcal:52,p:.3,c:13.8,f:.2,fb:2.4,sg:10.4},
{id:40,name:"Cam",g:"Hoa quả",kcal:47,p:.9,c:11.8,f:.1,fb:2.4,sg:9.4},
{id:41,name:"Bơ",g:"Hoa quả",kcal:160,p:2,c:8.5,f:14.7,fb:6.7,sg:.7},
{id:42,name:"Dưa hấu",g:"Hoa quả",kcal:30,p:.6,c:7.6,f:.2,fb:.4,sg:6.2},
{id:43,name:"Xoài",g:"Hoa quả",kcal:60,p:.8,c:15,f:.4,fb:1.6,sg:13.7},
{id:44,name:"Hạt điều",g:"Hạt",kcal:553,p:18.2,c:30.2,f:43.9,fb:3.3,sg:5.9},
{id:45,name:"Hạnh nhân",g:"Hạt",kcal:579,p:21.2,c:21.6,f:49.9,fb:12.5,sg:4.4},
{id:46,name:"Đậu phộng",g:"Hạt",kcal:567,p:25.8,c:16.1,f:49.2,fb:8.5,sg:4.7},
];
const GROUPS=["Tất cả","Tinh bột","Protein","Sữa","Rau củ","Hoa quả","Hạt"];
const MEALS=[{id:"sang",l:"Bữa sáng",ic:"🍳"},{id:"trua",l:"Bữa trưa",ic:"🍱"},{id:"phu",l:"Bữa phụ",ic:"🥗"},{id:"toi",l:"Bữa tối",ic:"🍽️"}];
const ACTS=[{v:1.2,l:"Ít vận động"},{v:1.375,l:"Tập 1–3 buổi/tuần"},{v:1.55,l:"Tập 3–5 buổi/tuần"},{v:1.725,l:"Tập nặng 6–7 buổi"}];
const GOALS=[{id:"loss",l:"Giảm cân",d:-500,pk:2},{id:"cut",l:"Giảm mỡ",d:-400,pk:2.2},{id:"maintain",l:"Duy trì",d:0,pk:1.8},{id:"gain",l:"Tăng cơ",d:300,pk:2}];
const MSR=[{k:"chest",l:"Ngực"},{k:"waist",l:"Eo"},{k:"hip",l:"Mông"},{k:"arm",l:"Tay"},{k:"thigh",l:"Đùi"}];

/* ===== STATE + STORAGE ===== */
function todayStr(d){d=d||new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function shiftDate(s,n){const d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n);return todayStr(d)}
function fmtD(s){const a=s.split("-");return a[2]+"/"+a[1]}
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));flashSaved()}catch(e){}}
function flashSaved(){const n=new Date();document.getElementById("saveStatus").textContent="💾 Đã lưu "+n.getHours()+":"+String(n.getMinutes()).padStart(2,"0")}

let profile=lsGet("nutri_profile")||{gender:"male",age:31,height:169,weight:66,activity:1.55,goal:"cut"};
let date=todayStr();
let tab="home";
function emptyDay(){return{meals:{sang:[],trua:[],phu:[],toi:[]},weight:"",measures:{chest:"",waist:"",hip:"",arm:"",thigh:""}}}
function loadDay(dt){const r=lsGet("nutri_day_"+dt);if(!r)return emptyDay();const e=emptyDay();return{meals:Object.assign(e.meals,r.meals||{}),weight:r.weight||"",measures:Object.assign(e.measures,r.measures||{})}}
let day=loadDay(date);
function saveDay(){lsSet("nutri_day_"+date,Object.assign({},day,{totals:totals()}))}
function saveProfile(){lsSet("nutri_profile",profile)}

/* ===== CALC ===== */
function calcBMR(){const b=10*profile.weight+6.25*profile.height-5*profile.age;return Math.round(profile.gender==="male"?b+5:b-161)}
function targets(){const bmr=calcBMR(),tdee=Math.round(bmr*profile.activity);const goal=GOALS.find(g=>g.id===profile.goal)||GOALS[2];const kcal=tdee+goal.d;const pr=Math.round(profile.weight*goal.pk);const ft=Math.round(kcal*.25/9);const cb=Math.round((kcal-pr*4-ft*9)/4);return{bmr,tdee,kcal,protein:pr,fat:ft,carb:cb}}
function totals(){const t={kcal:0,p:0,c:0,f:0,fb:0,sg:0};MEALS.forEach(m=>(day.meals[m.id]||[]).forEach(i=>{t.kcal+=i.kcal;t.p+=i.p;t.c+=i.c;t.f+=i.f;t.fb+=i.fb||0;t.sg+=i.sg||0}));for(const k in t)t[k]=Math.round(t[k]*10)/10;t.kcal=Math.round(t.kcal);return t}
function mealTot(items){const t={kcal:0,p:0,c:0,f:0};(items||[]).forEach(i=>{t.kcal+=i.kcal;t.p+=i.p;t.c+=i.c;t.f+=i.f});for(const k in t)t[k]=Math.round(t[k]);return t}

/* ===== NAV ===== */
const TABS=[{id:"home",l:"Hôm nay",ic:"🏠"},{id:"history",l:"Lịch sử",ic:"📈"},{id:"profile",l:"Hồ sơ",ic:"👤"}];
function setTab(t){tab=t;render()}
function renderNav(){document.getElementById("nav").innerHTML=TABS.map(t=>`<button class="${tab===t.id?'on':''}" onclick="setTab('${t.id}')"><div class="ic">${t.ic}</div>${t.l}</button>`).join("")}

/* ===== HOME ===== */
function barHtml(v,mx,color,h){h=h||8;const pct=mx>0?Math.min(v/mx*100,100):0;const c=mx>0&&v>mx?"var(--red)":color;return`<div class="bar" style="height:${h}px"><div style="width:${pct}%;background:${c}"></div></div>`}
function setDate(d){date=d;day=loadDay(date);render()}
function renderHome(){
  const t=targets(),tt=totals(),rem=t.kcal-tt.kcal,isToday=date===todayStr();
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button class="navbtn" onclick="setDate(shiftDate(date,-1))">‹</button>
    <div style="text-align:center"><div style="font-size:15px;font-weight:800">${isToday?"Hôm nay":fmtD(date)}</div><div style="font-size:11px;color:var(--graylt)">${date}</div></div>
    <button class="navbtn" style="opacity:${isToday?.3:1}" onclick="${isToday?'':'setDate(shiftDate(date,1))'}">›</button></div>`;
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">
    <div><div style="font-size:12px;color:var(--gray)">Còn lại</div><div style="font-size:34px;font-weight:800;color:${rem>=0?'var(--greendark)':'var(--red)'};line-height:1.1">${rem>=0?rem:"+"+Math.abs(rem)}<span style="font-size:14px;color:var(--graylt);font-weight:600"> kcal</span></div></div>
    <div style="text-align:right;font-size:12px;color:var(--gray);line-height:1.7">Mục tiêu <b style="color:var(--text)">${t.kcal}</b><br>Đã ăn <b style="color:var(--text)">${tt.kcal}</b></div></div>
    ${barHtml(tt.kcal,t.kcal,"var(--green)",10)}</div>`;
  h+=`<div class="row">`+[["Protein",tt.p,t.protein,"var(--green)"],["Carb",tt.c,t.carb,"var(--amber)"],["Fat",tt.f,t.fat,"var(--blue)"]].map(m=>
    `<div class="card" style="flex:1;padding:12px;margin-bottom:0"><div style="font-size:11px;color:var(--gray)">${m[0]}</div><div style="font-size:15px;font-weight:800;margin:4px 0 6px">${Math.round(m[1])}<span style="font-size:11px;color:var(--graylt);font-weight:600">/${m[2]}g</span></div>${barHtml(m[1],m[2],m[3],6)}</div>`).join("")+`</div>`;
  h+=`<div class="row" style="margin-top:8px">
    <div class="card" style="flex:1;padding:10px 12px;margin:0;display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--gray)">🌾 Chất xơ</span><span style="font-size:14px;font-weight:800;color:var(--purple)">${tt.fb}g<span style="font-size:11px;color:var(--graylt);font-weight:500"> /25g</span></span></div>
    <div class="card" style="flex:1;padding:10px 12px;margin:0;display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--gray)">🍬 Đường</span><span style="font-size:14px;font-weight:800;color:${tt.sg>50?'var(--red)':'var(--pink)'}">${tt.sg}g<span style="font-size:11px;color:var(--graylt);font-weight:500"> ≤50g</span></span></div></div>`;
  h+=`<div class="sectitle">Nhật ký bữa ăn</div>`;
  MEALS.forEach(m=>{
    const items=day.meals[m.id]||[],mt=mealTot(items);
    h+=`<div class="card" style="padding:14px"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:14px;font-weight:800">${m.ic} ${m.l}</div><div style="font-size:13px;font-weight:800;color:var(--greendark)">${mt.kcal} kcal</div></div>`;
    if(items.length)h+=`<div style="font-size:11px;color:var(--graylt);margin-top:2px">P ${mt.p}g · C ${mt.c}g · F ${mt.f}g</div>`;
    items.forEach(it=>{h+=`<div class="item"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${it.name}</div><div style="font-size:11px;color:var(--graylt)">${it.grams>0?it.grams+"g · ":""}P ${Math.round(it.p)} · C ${Math.round(it.c)} · F ${Math.round(it.f)}</div></div><div style="font-size:13px;font-weight:700;color:var(--gray)">${Math.round(it.kcal)}</div><button class="xbtn" onclick="removeItem('${m.id}',${it.id})">✕</button></div>`});
    h+=`<button class="btn-outline" onclick="openSheet('${m.id}')">+ Thêm món</button></div>`;
  });
  return h;
}
function removeItem(mid,iid){day.meals[mid]=day.meals[mid].filter(i=>i.id!==iid);saveDay();render()}

/* ===== ADD FOOD SHEET ===== */
let sheetMeal=null,sheetMode="lib",sheetGroup="Tất cả",sheetSearch="",selFood=null;
function openSheet(mid){sheetMeal=mid;sheetMode="lib";sheetGroup="Tất cả";sheetSearch="";selFood=null;document.getElementById("sheetWrap").classList.remove("hidden");renderSheet()}
function closeSheet(){document.getElementById("sheetWrap").classList.add("hidden")}
function setSheetMode(m){sheetMode=m;renderSheet()}
function setSheetGroup(g){sheetGroup=g;renderSheet()}
function sheetSearchUpd(v){sheetSearch=v;renderSheet(true)}
function selectFood(id){selFood=selFood===id?null:id;renderSheet()}
function gramUpd(){const f=FOODS.find(x=>x.id===selFood);if(!f)return;const g=parseFloat(document.getElementById("gramIn").value)||0;document.getElementById("gramKcal").innerHTML="= <b style='color:var(--greendark)'>"+Math.round(f.kcal*g/100)+" kcal</b>"}
function addSel(){const f=FOODS.find(x=>x.id===selFood);const g=parseFloat(document.getElementById("gramIn").value)||0;if(!f||g<=0)return;const r=g/100;day.meals[sheetMeal].push({id:Date.now(),name:f.name,grams:g,kcal:f.kcal*r,p:f.p*r,c:f.c*r,f:f.f*r,fb:f.fb*r,sg:f.sg*r});saveDay();selFood=null;renderSheet();render(true)}
function addManual(){const nm=document.getElementById("mNm").value.trim(),k=parseFloat(document.getElementById("mK").value)||0;if(!nm||!k)return;day.meals[sheetMeal].push({id:Date.now(),name:nm,grams:0,kcal:k,p:parseFloat(document.getElementById("mP").value)||0,c:parseFloat(document.getElementById("mC").value)||0,f:parseFloat(document.getElementById("mF").value)||0,fb:0,sg:0});saveDay();closeSheet();render()}
function renderSheet(keepFocus){
  const m=MEALS.find(x=>x.id===sheetMeal);
  let h=`<div style="padding:14px 16px 10px;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:15px;font-weight:800">Thêm vào ${m.ic} ${m.l}</div><button onclick="closeSheet()" style="border:none;background:#F1F5F3;border-radius:10px;width:30px;height:30px;cursor:pointer;color:var(--gray)">✕</button></div>
  <div class="row" style="margin-top:10px"><button class="btn" style="flex:1;padding:8px 0;font-size:13px;background:${sheetMode==='lib'?'var(--green)':'#F1F5F3'};color:${sheetMode==='lib'?'#fff':'var(--gray)'}" onclick="setSheetMode('lib')">📚 Thư viện</button><button class="btn" style="flex:1;padding:8px 0;font-size:13px;background:${sheetMode==='manual'?'var(--green)':'#F1F5F3'};color:${sheetMode==='manual'?'#fff':'var(--gray)'}" onclick="setSheetMode('manual')">✍️ Thủ công</button></div></div>`;
  if(sheetMode==="lib"){
    h+=`<div style="padding:10px 16px"><input id="srchIn" placeholder="Tìm thực phẩm..." value="${sheetSearch}" oninput="sheetSearchUpd(this.value)">
    <div style="display:flex;gap:6px;margin-top:8px;overflow-x:auto;padding-bottom:4px">${GROUPS.map(g=>`<button class="chip ${sheetGroup===g?'on':''}" onclick="setSheetGroup('${g}')">${g}</button>`).join("")}</div></div><div style="overflow-y:auto;flex:1;padding:0 16px 16px">`;
    const list=FOODS.filter(f=>(sheetGroup==="Tất cả"||f.g===sheetGroup)&&f.name.toLowerCase().includes(sheetSearch.toLowerCase()));
    list.forEach(f=>{
      h+=`<div class="foodrow ${selFood===f.id?'sel':''}" onclick="selectFood(${f.id})"><div><div style="font-size:13.5px;font-weight:600">${f.name}</div><div style="font-size:11px;color:var(--graylt)">P ${f.p} · C ${f.c} · F ${f.f} /100g</div></div><div style="font-size:13px;font-weight:800;color:var(--greendark)">${f.kcal} kcal</div></div>`;
      if(selFood===f.id)h+=`<div style="display:flex;gap:8px;padding:10px 4px;align-items:center"><input type="number" id="gramIn" value="100" oninput="gramUpd()" style="width:100px"><span style="font-size:12px;color:var(--gray)">gram</span><div id="gramKcal" style="flex:1;font-size:12px;color:var(--gray);text-align:right">= <b style="color:var(--greendark)">${f.kcal} kcal</b></div><button class="btn" style="padding:9px 18px;background:var(--green);color:#fff;font-size:13px" onclick="event.stopPropagation();addSel()">Thêm</button></div>`;
    });
    if(!list.length)h+=`<div style="padding:20px;text-align:center;color:var(--graylt);font-size:13px">Không tìm thấy — thử tab "Thủ công"</div>`;
    h+=`</div>`;
  }else{
    h+=`<div style="padding:16px;display:flex;flex-direction:column;gap:10px"><input id="mNm" placeholder="Tên món (vd: Phở bò tái)"><div class="row"><input type="number" id="mK" placeholder="Calo (kcal)"><input type="number" id="mP" placeholder="Protein (g)"></div><div class="row"><input type="number" id="mC" placeholder="Carb (g)"><input type="number" id="mF" placeholder="Fat (g)"></div><div style="font-size:11.5px;color:var(--graylt)">Nhập tổng dinh dưỡng của cả phần ăn (không phải trên 100g)</div><button class="btn btn-green" onclick="addManual()">Thêm món</button></div>`;
  }
  document.getElementById("sheetBox").innerHTML=h;
  if(keepFocus){const s=document.getElementById("srchIn");if(s){s.focus();s.setSelectionRange(s.value.length,s.value.length)}}
}

/* ===== HISTORY ===== */
let chW=null,chK=null;
function allDays(){const rows=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf("nutri_day_")===0){const r=lsGet(k);if(r)rows.push(Object.assign({date:k.replace("nutri_day_","")},r))}}rows.sort((a,b)=>a.date<b.date?-1:1);return rows.slice(-30)}
function updWeight(v){day.weight=v;saveDay()}
function updMeasure(k,v){day.measures[k]=v;saveDay()}
function renderHistory(){
  const hist=allDays();
  const kd=hist.filter(x=>x.totals&&x.totals.kcal>0);
  const avgK=kd.length?Math.round(kd.reduce((s,x)=>s+x.totals.kcal,0)/kd.length):0;
  const avgP=kd.length?Math.round(kd.reduce((s,x)=>s+x.totals.p,0)/kd.length):0;
  let h=`<div class="card"><div style="font-size:15px;font-weight:800;margin-bottom:10px">📏 Cân nặng & số đo — ${fmtD(date)}</div>
  <div style="font-size:11.5px;color:var(--gray);margin-bottom:4px">Cân nặng (kg)</div>
  <input type="number" value="${day.weight}" onchange="updWeight(this.value)" placeholder="66.0" style="margin-bottom:10px">
  <div style="display:flex;gap:8px;flex-wrap:wrap">${MSR.map(m=>`<div style="flex:1 0 28%"><div style="font-size:11.5px;color:var(--gray);margin-bottom:4px">${m.l} (cm)</div><input type="number" value="${day.measures[m.k]||''}" onchange="updMeasure('${m.k}',this.value)"></div>`).join("")}</div>
  <div style="font-size:11px;color:var(--graylt);margin-top:8px">Số liệu tự lưu ngay khi nhập xong</div></div>`;
  h+=`<div class="row">${[[avgK||"—","Calo TB/ngày","var(--greendark)"],[avgP?avgP+"g":"—","Protein TB/ngày","var(--green)"],[hist.length,"Ngày đã ghi","var(--blue)"]].map(x=>`<div class="card" style="flex:1;padding:12px;text-align:center;margin:0"><div style="font-size:20px;font-weight:800;color:${x[2]}">${x[0]}</div><div style="font-size:11px;color:var(--gray)">${x[1]}</div></div>`).join("")}</div>`;
  h+=`<div class="sectitle">Biểu đồ cân nặng</div><div class="card" style="padding:14px 8px 6px"><canvas id="cW" height="190"></canvas><div id="cWempty" style="display:none;padding:20px;text-align:center;color:var(--graylt);font-size:12.5px">Ghi cân nặng ≥2 ngày để hiện biểu đồ</div></div>`;
  h+=`<div class="sectitle">Calo theo ngày</div><div class="card" style="padding:14px 8px 6px"><canvas id="cK" height="190"></canvas><div id="cKempty" style="display:none;padding:20px;text-align:center;color:var(--graylt);font-size:12.5px">Chưa có dữ liệu — nhập bữa ăn ở tab Hôm nay</div></div>`;
  return h;
}
function drawCharts(){
  const hist=allDays();
  const wd=hist.filter(x=>x.weight&&parseFloat(x.weight)>0);
  const kd=hist.filter(x=>x.totals&&x.totals.kcal>0);
  if(chW){chW.destroy();chW=null}if(chK){chK.destroy();chK=null}
  const cw=document.getElementById("cW"),ck=document.getElementById("cK");
  if(!cw||!ck)return;
  if(wd.length>=2){chW=new Chart(cw,{type:"line",data:{labels:wd.map(x=>fmtD(x.date)),datasets:[{label:"Cân (kg)",data:wd.map(x=>parseFloat(x.weight)),borderColor:"#10B981",backgroundColor:"#10B981",tension:.3,pointRadius:3.5}]},options:{plugins:{legend:{display:false}},scales:{y:{grace:"5%"}}}})}
  else{cw.style.display="none";document.getElementById("cWempty").style.display="block"}
  if(kd.length>=1){chK=new Chart(ck,{type:"bar",data:{labels:kd.map(x=>fmtD(x.date)),datasets:[{label:"Calo",data:kd.map(x=>x.totals.kcal),backgroundColor:"#10B981",borderRadius:6}]},options:{plugins:{legend:{display:false}}}})}
  else{ck.style.display="none";document.getElementById("cKempty").style.display="block"}
}

/* ===== PROFILE ===== */
function updProfile(k,v){profile[k]=(k==="gender"||k==="goal")?v:parseFloat(v)||0;saveProfile();render()}
function exportData(){const out={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf("nutri_")===0)out[k]=localStorage.getItem(k)}const blob=new Blob([JSON.stringify(out)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="nutrition-backup-"+todayStr()+".json";a.click()}
function importData(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);for(const k in d)localStorage.setItem(k,d[k]);profile=lsGet("nutri_profile")||profile;day=loadDay(date);alert("Khôi phục thành công!");render()}catch(e){alert("File không hợp lệ")}};r.readAsText(f)}
function renderProfile(){
  const t=targets();
  let h=`<div class="card"><div style="font-size:15px;font-weight:800;margin-bottom:12px">👤 Hồ sơ cá nhân</div>
  <div class="row" style="margin-bottom:10px">${[["male","Nam"],["female","Nữ"]].map(g=>`<button class="btn" style="flex:1;padding:10px 0;font-size:13px;background:${profile.gender===g[0]?'var(--green)':'#F1F5F3'};color:${profile.gender===g[0]?'#fff':'var(--gray)'}" onclick="updProfile('gender','${g[0]}')">${g[1]}</button>`).join("")}</div>
  <div class="row" style="margin-bottom:10px">${[["age","Tuổi"],["height","Cao (cm)"],["weight","Nặng (kg)"]].map(f=>`<div style="flex:1"><div style="font-size:11.5px;color:var(--gray);margin-bottom:4px">${f[1]}</div><input type="number" value="${profile[f[0]]}" onchange="updProfile('${f[0]}',this.value)"></div>`).join("")}</div>
  <div style="font-size:11.5px;color:var(--gray);margin-bottom:6px">Mức độ vận động</div>
  ${ACTS.map(a=>`<button style="display:block;width:100%;text-align:left;padding:10px 12px;border-radius:12px;margin-bottom:6px;cursor:pointer;font-weight:600;font-size:13px;border:1.5px solid ${profile.activity===a.v?'var(--green)':'var(--border)'};background:${profile.activity===a.v?'var(--greenbg)':'#fff'};color:${profile.activity===a.v?'var(--greendark)':'var(--gray)'}" onclick="updProfile('activity',${a.v})">${a.l}</button>`).join("")}
  <div style="font-size:11.5px;color:var(--gray);margin:8px 0 6px">Mục tiêu</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">${GOALS.map(g=>`<button class="btn" style="flex:1 0 40%;padding:10px 0;font-size:13px;background:${profile.goal===g.id?'var(--green)':'#F1F5F3'};color:${profile.goal===g.id?'#fff':'var(--gray)'}" onclick="updProfile('goal','${g.id}')">${g.l}</button>`).join("")}</div></div>`;
  h+=`<div class="sectitle">Chỉ số tự động tính</div><div class="row">
  <div class="card" style="flex:1;padding:12px;text-align:center;margin:0"><div style="font-size:11px;color:var(--gray)">BMR</div><div style="font-size:19px;font-weight:800">${t.bmr}</div><div style="font-size:10px;color:var(--graylt)">kcal nghỉ</div></div>
  <div class="card" style="flex:1;padding:12px;text-align:center;margin:0"><div style="font-size:11px;color:var(--gray)">TDEE</div><div style="font-size:19px;font-weight:800">${t.tdee}</div><div style="font-size:10px;color:var(--graylt)">kcal tiêu hao</div></div>
  <div class="card" style="flex:1;padding:12px;text-align:center;margin:0;background:var(--greenbg);border:1.5px solid var(--green)"><div style="font-size:11px;color:var(--greendark)">Mục tiêu</div><div style="font-size:19px;font-weight:800;color:var(--greendark)">${t.kcal}</div><div style="font-size:10px;color:var(--greendark)">kcal/ngày</div></div></div>`;
  h+=`<div class="card" style="margin-top:10px;padding:14px"><div style="font-size:12.5px;color:var(--gray);line-height:1.8">Duy trì: <b style="color:var(--text)">${t.tdee} kcal</b> · Giảm mỡ: <b style="color:var(--text)">${t.tdee-400} kcal</b> · Tăng cơ: <b style="color:var(--text)">${t.tdee+300} kcal</b><br>Macro hiện tại: Protein <b style="color:var(--green)">${t.protein}g</b> · Carb <b style="color:var(--amber)">${t.carb}g</b> · Fat <b style="color:var(--blue)">${t.fat}g</b></div></div>`;
  h+=`<div class="sectitle">Sao lưu dữ liệu</div><div class="card" style="padding:14px"><div style="font-size:12px;color:var(--gray);line-height:1.6;margin-bottom:10px">Dữ liệu lưu trên trình duyệt máy này. Nên sao lưu định kỳ để không mất khi xóa dữ liệu trình duyệt hoặc đổi máy.</div>
  <div class="row"><button class="btn" style="flex:1;padding:11px 0;font-size:13px;background:var(--green);color:#fff" onclick="exportData()">⬇️ Xuất file sao lưu</button>
  <label class="btn" style="flex:1;padding:11px 0;font-size:13px;background:#F1F5F3;color:var(--gray);text-align:center;line-height:1.2;display:flex;align-items:center;justify-content:center;cursor:pointer">⬆️ Khôi phục<input type="file" accept=".json" style="display:none" onchange="importData(this)"></label></div></div>`;
  h+=`<div style="font-size:11px;color:var(--graylt);text-align:center;margin-top:14px;line-height:1.6">Bản web độc lập — tính năng AI (phân tích khẩu phần, quét ảnh món ăn)<br>chỉ có trên bản chạy trong Claude.</div>`;
  return h;
}

/* ===== RENDER ===== */
function render(skipSheet){
  renderNav();
  const c=document.getElementById("content");
  if(tab==="home")c.innerHTML=renderHome();
  else if(tab==="history"){c.innerHTML=renderHistory();setTimeout(drawCharts,50)}
  else c.innerHTML=renderProfile();
}
render();
</script>
</body>
</html>
